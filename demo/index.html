<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PostgreSQL Execution Plan Diagram — Mermaid Plugin Demo</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11/styles/github.min.css" id="hljsTheme">
<style>
  :root {
    --bg: #f8f9fa;
    --card-bg: #ffffff;
    --text: #1e1e2e;
    --muted: #6b7280;
    --border: #e5e7eb;
    --accent: #4CAF50;
  }
  .dark {
    --bg: #1e1e2e;
    --card-bg: #181825;
    --text: #cdd6f4;
    --muted: #6c7086;
    --border: #313244;
    --accent: #40a02b;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    padding: 0;
  }
  .header {
    border-bottom: 1px solid var(--border);
    padding: 24px 32px;
    background: var(--card-bg);
  }
  .header-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .header h1 {
    font-size: 24px;
    font-weight: 700;
    margin-bottom: 4px;
  }
  .header p {
    color: var(--muted);
    font-size: 14px;
  }
  .theme-toggle {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 6px 12px;
    cursor: pointer;
    font-size: 16px;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 6px;
    transition: all 0.2s;
  }
  .theme-toggle:hover {
    border-color: var(--accent);
  }
  .theme-toggle .label {
    font-size: 12px;
    font-weight: 500;
    color: var(--muted);
  }
  .tabs {
    display: flex;
    gap: 4px;
    padding: 16px 32px 0;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .tabs button {
    padding: 8px 20px;
    border: 1px solid transparent;
    border-bottom: none;
    border-radius: 8px 8px 0 0;
    background: transparent;
    color: var(--muted);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    font-family: inherit;
  }
  .tabs button:hover {
    color: var(--text);
    background: var(--card-bg);
  }
  .tabs button.active {
    color: var(--accent);
    background: var(--card-bg);
    border-color: var(--border);
    font-weight: 600;
  }
  .tabs button .count {
    display: inline-block;
    background: var(--border);
    color: var(--muted);
    font-size: 11px;
    padding: 0 6px;
    border-radius: 8px;
    margin-left: 6px;
    font-weight: 400;
  }
  .tabs button.active .count {
    background: var(--accent);
    color: #fff;
  }
  .header .badge {
    display: inline-block;
    background: var(--accent);
    color: #fff;
    font-size: 11px;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 4px;
    margin-left: 8px;
    vertical-align: middle;
  }
  .container { max-width: 1200px; margin: 0 auto; padding: 24px 32px; }
  .plan-card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 12px;
    margin-bottom: 32px;
    overflow: hidden;
  }
  .plan-card-header {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .plan-card-header h2 {
    font-size: 16px;
    font-weight: 600;
  }
  .plan-card-header .sql {
    font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 13px;
    color: var(--accent);
    background: var(--bg);
    padding: 4px 10px;
    border-radius: 6px;
  }
  .plan-card-body {
    padding: 20px;
    min-height: 100px;
    display: flex;
    justify-content: center;
    overflow-x: auto;
  }
  .plan-card-body .mermaid {
    width: 100%;
  }
  .plan-card-body .mermaid svg {
    max-width: 100%;
  }
  .plan-card-raw {
    border-top: 1px solid var(--border);
    padding: 16px 20px;
    background: var(--bg);
  }
  .plan-card-raw summary {
    cursor: pointer;
    font-size: 13px;
    color: var(--muted);
    font-weight: 500;
  }
  .plan-card-raw pre {
    margin-top: 12px;
    font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 12px;
    line-height: 1.5;
    white-space: pre;
    overflow-x: auto;
    color: var(--muted);
  }
  .legend { padding: 16px 32px; background: var(--bg); border-bottom: 1px solid var(--border); }
  .legend h3 {
    font-size: 13px;
    font-weight: 600;
    color: var(--muted);
    margin-bottom: 12px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .legend-columns {
    display: flex;
    gap: 16px;
    overflow-x: auto;
  }
  .legend-col {
    min-width: 180px;
    flex: 1;
  }
  .legend-col h4 {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    padding: 4px 8px;
    border-radius: 4px;
    color: #fff;
    margin-bottom: 6px;
    display: inline-block;
  }
  .legend-col-items {
    display: flex;
    flex-direction: column;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 2px 0;
    font-size: 11px;
    color: var(--text);
  }
  .legend-swatch {
    width: 10px;
    height: 10px;
    border-radius: 3px;
    flex-shrink: 0;
  }
  .legend-type {
    font-weight: 600;
    font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 11px;
    white-space: nowrap;
  }
  .legend-desc {
    color: var(--muted);
    font-size: 10px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .footer {
    text-align: center;
    padding: 32px;
    color: var(--muted);
    font-size: 13px;
    border-top: 1px solid var(--border);
  }
  .footer a { color: var(--accent); }

  /* ── Side panel ── */
  .panel-toggle {
    position: fixed;
    right: 0;
    top: 50%;
    transform: translateY(-50%);
    z-index: 20;
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-right: none;
    border-radius: 8px 0 0 8px;
    padding: 8px 5px;
    cursor: pointer;
    color: var(--muted);
    transition: right 0.3s, color 0.2s;
    font-family: inherit;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
  }
  .panel-toggle:hover { color: var(--accent); }
  .panel-toggle.open { right: 280px; }
  .panel-toggle .icon { font-size: 16px; line-height: 1; }
  .panel-toggle .label { font-size: 9px; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; }

  .slide-panel {
    position: fixed;
    right: -280px;
    top: 0;
    width: 280px;
    height: 100%;
    background: var(--card-bg);
    border-left: 1px solid var(--border);
    z-index: 19;
    transition: right 0.3s;
    display: flex;
    flex-direction: column;
  }
  .slide-panel.open { right: 0; }
  .slide-panel-header {
    padding: 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .slide-panel-header h3 {
    font-size: 13px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .slide-panel-header .count {
    color: var(--muted);
    font-size: 11px;
    font-weight: 400;
  }
  .slide-panel-close {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--muted);
    font-size: 18px;
    padding: 2px 6px;
    border-radius: 4px;
  }
  .slide-panel-close:hover { color: var(--text); background: var(--bg); }
  .slide-panel-body {
    flex: 1;
    overflow-y: auto;
    padding: 8px 0;
  }
  .slide-panel-item {
    display: block;
    width: 100%;
    text-align: left;
    padding: 8px 16px;
    border: none;
    background: none;
    cursor: pointer;
    color: var(--text);
    font-family: inherit;
    font-size: 12px;
    line-height: 1.4;
    transition: background 0.15s;
    border-left: 3px solid transparent;
  }
  .slide-panel-item:hover { background: var(--bg); }
  .slide-panel-item .n {
    color: var(--text);
    font-weight: 400;
  }
  .slide-panel-group { margin-bottom: 4px; }
  .slide-panel-group-header {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    padding: 5px 16px;
    color: #fff;
  }

  .slide-panel-overlay {
    position: fixed;
    inset: 0;
    z-index: 18;
    background: rgba(0,0,0,0.15);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
  }
  .slide-panel-overlay.open {
    opacity: 1;
    pointer-events: auto;
  }
</style>
</head>
<body>
<div class="header">
  <div class="header-row">
    <div>
      <h1>PostgreSQL Execution Plan Diagram <span class="badge">Mermaid Plugin</span></h1>
      <p>Visualize <code>EXPLAIN (ANALYZE, COSTS, BUFFERS, FORMAT TEXT)</code> output as interactive tree diagrams</p>
    </div>
    <button class="theme-toggle" id="themeToggle" title="Toggle dark/light mode">
      <span id="themeIcon">\u2600\uFE0F</span>
      <span class="label" id="themeLabel">Light</span>
    </button>
  </div>
</div>

<div class="legend" id="legend"></div>
<div class="tabs" id="tabs"></div>
<div class="container" id="examples"></div>

<button class="panel-toggle" id="panelToggle" title="Show example list">
  <span class="icon">☰</span>
  <span class="label">Examples</span>
</button>
<div class="slide-panel-overlay" id="panelOverlay"></div>
<div class="slide-panel" id="slidePanel">
  <div class="slide-panel-header">
    <h3>Examples <span class="count" id="panelCount"></span></h3>
    <button class="slide-panel-close" id="panelClose">✕</button>
  </div>
  <div class="slide-panel-body" id="panelBody"></div>
</div>

<div class="footer">
  Built with <a href="https://mermaid.js.org">Mermaid</a> &middot;
  Source: <code>src/</code>
</div>

<script src="https://cdn.jsdelivr.net/npm/highlight.js@11/build/highlight.min.js"></script>
<script type="module">
import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';
import { pgPlanDiagram } from '../src/index.js';
import { examples } from './examples.js';
import { NODE_TYPES, CATEGORIES } from './node-types.js';

await mermaid.registerExternalDiagrams([pgPlanDiagram], { lazyLoad: false });

mermaid.initialize({
  theme: 'base',
  themeVariables: {
    background: 'transparent',
    primaryColor: 'transparent',
    primaryBorderColor: 'transparent',
  },
  securityLevel: 'loose',
  fontFamily: '"SF Mono", "Fira Code", monospace',
});

// ── Build tabs ──
const categories = ['SELECT', 'INSERT', 'UPDATE', 'DELETE'];
const tabsEl = document.getElementById('tabs');
const container = document.getElementById('examples');
let activeCategory = 'SELECT';

function escHtml(s) {
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function renderCards(category) {
  container.innerHTML = '';
  const filtered = category === 'ALL' ? examples : examples.filter(e => e.category === category);
  for (const [idx, ex] of filtered.entries()) {
    const card = document.createElement('div');
    card.className = 'plan-card';
    const slug = ex.title.replace(/[^a-zA-Z0-9\u2014]+/g, '-').replace(/^-+|-+$/g, '').toLowerCase();
    card.id = `card-${slug}`;
    const planText = ex.format === 'json' ? JSON.stringify(ex.plan) : ex.plan;
    const rawText = ex.format === 'json' ? JSON.stringify(ex.plan, null, 2) : ex.plan;
    const sqlEsc = escHtml(ex.sql);
    const sqlTrunc = sqlEsc.length > 80 ? sqlEsc.substring(0, 80) + '\u2026' : sqlEsc;
    card.innerHTML = `
      <div class="plan-card-header">
        <h2>${ex.title}</h2>
        <code class="sql language-sql" title="${escHtml(ex.sql)}">${sqlTrunc}</code>
      </div>
      <div class="plan-card-body">
        <div class="mermaid">pg-plan
${planText}</div>
      </div>
      <details class="plan-card-raw">
        <summary>View raw EXPLAIN output</summary>
        <pre>${rawText}</pre>
      </details>
      <details class="plan-card-raw">
        <summary>View Mermaid source</summary>
        <pre>pg-plan
${planText}</pre>
      </details>
    `;
    container.appendChild(card);
  }
  mermaid.run({ querySelector: '.mermaid' }).catch(function(err) {
    console.error('mermaid.run error:', err);
  });
  hljsHighlight();
}

function hljsHighlight() {
  if (typeof hljs !== 'undefined') {
    document.querySelectorAll('.sql').forEach(el => hljs.highlightElement(el));
  }
}

function buildTabs() {
  for (const cat of categories) {
    const count = examples.filter(e => e.category === cat).length;
    const btn = document.createElement('button');
    btn.dataset.cat = cat;
    btn.innerHTML = `${cat} <span class="count">${count}</span>`;
    if (cat === activeCategory) btn.classList.add('active');
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tabs button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      activeCategory = cat;
      renderCards(cat);
      if (panelOpen) buildPanel();
    });
    tabsEl.appendChild(btn);
  }
}

// ── Side panel ──
const panelToggle = document.getElementById('panelToggle');
const panelOverlay = document.getElementById('panelOverlay');
const slidePanel = document.getElementById('slidePanel');
const panelBody = document.getElementById('panelBody');
const panelCount = document.getElementById('panelCount');
const panelClose = document.getElementById('panelClose');
let panelOpen = false;

function togglePanel(open) {
  panelOpen = open;
  panelToggle.classList.toggle('open', open);
  slidePanel.classList.toggle('open', open);
  panelOverlay.classList.toggle('open', open);
}

function buildPanel() {
  const catColor = { SELECT: '#4CAF50', INSERT: '#2196F3', UPDATE: '#FF9800', DELETE: '#f44336' };
  const cats = ['SELECT', 'INSERT', 'UPDATE', 'DELETE'];
  const total = examples.length;
  panelCount.textContent = `(${total})`;
  let html = '';
  for (const c of cats) {
    const items = examples.filter(e => e.category === c);
    if (items.length === 0) continue;
    const color = catColor[c];
    html += `<div class="slide-panel-group">
      <div class="slide-panel-group-header" style="background:${color}">${c} (${items.length})</div>`;
    for (const ex of items) {
      const slug = ex.title.replace(/[^a-zA-Z0-9\u2014]+/g, '-').replace(/^-+|-+$/g, '').toLowerCase();
      html += `<button class="slide-panel-item" data-slug="${slug}" data-cat="${ex.category}">
        <span class="n">${ex.title}</span>
      </button>`;
    }
    html += '</div>';
  }
  panelBody.innerHTML = html;

  panelBody.querySelectorAll('.slide-panel-item').forEach(btn => {
    btn.addEventListener('click', () => {
      const slug = btn.dataset.slug;
      const cat = btn.dataset.cat;
      function scrollToCard() {
        const el = document.getElementById(`card-${slug}`);
        if (el) {
          el.scrollIntoView({ behavior: 'smooth', block: 'start' });
          togglePanel(false);
        }
      }
      if (cat && cat !== activeCategory) {
        const tabBtn = document.querySelector(`.tabs button[data-cat="${cat}"]`);
        if (tabBtn) {
          tabBtn.click();
          requestAnimationFrame(scrollToCard);
          return;
        }
      }
      scrollToCard();
    });
  });
}

panelToggle.addEventListener('click', () => togglePanel(!panelOpen));
panelClose.addEventListener('click', () => togglePanel(false));
panelOverlay.addEventListener('click', () => togglePanel(false));

// ── Build legend ──
function buildLegend(isDark) {
  const el = document.getElementById('legend');
  const catColors = {};
  for (const c of CATEGORIES) catColors[c.cat] = isDark ? c.colorDark : c.color;

  let html = '<h3>Node types</h3><div class="legend-columns">';
  for (const c of CATEGORIES) {
    const color = catColors[c.cat];
    const items = NODE_TYPES.filter(nt => nt.cat === c.cat);
    html += `<div class="legend-col">
      <h4 style="background:${color}">${c.label} (${items.length})</h4>
      <div class="legend-col-items">`;
    for (const nt of items) {
      html += `<div class="legend-item">
        <span class="legend-swatch" style="background:${color}"></span>
        <span class="legend-type">${nt.type}</span>
        <span class="legend-desc">— ${nt.desc}</span>
      </div>`;
    }
    html += '</div></div>';
  }
  html += '</div>';
  el.innerHTML = html;
}

buildLegend(false);
buildTabs();
buildPanel();
renderCards('SELECT');

// ── Dark/light toggle ──
const toggle = document.getElementById('themeToggle');
const icon = document.getElementById('themeIcon');
const label = document.getElementById('themeLabel');
let isDark = false;

toggle.addEventListener('click', () => {
  isDark = !isDark;
  document.documentElement.classList.toggle('dark', isDark);
  document.getElementById('hljsTheme').href = isDark
    ? 'https://cdn.jsdelivr.net/npm/highlight.js@11/styles/github-dark.min.css'
    : 'https://cdn.jsdelivr.net/npm/highlight.js@11/styles/github.min.css';
  icon.textContent = isDark ? '\u{1F319}' : '\u2600\uFE0F';
  label.textContent = isDark ? 'Dark' : 'Light';
  buildLegend(isDark);
  if (panelOpen) buildPanel();
  renderCards(activeCategory);
});
</script>
</body>
</html>
