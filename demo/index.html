<title>PostgreSQL Execution Plan Diagram — Mermaid Plugin Demo</title>
<style>
  :root {
    --bg: #f8f9fa;
    --card-bg: #ffffff;
    --text: #1e1e2e;
    --muted: #6b7280;
    --border: #e5e7eb;
    --accent: #4CAF50;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1e1e2e;
      --card-bg: #181825;
      --text: #cdd6f4;
      --muted: #6c7086;
      --border: #313244;
      --accent: #40a02b;
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    padding: 0;
  }
  .header {
    border-bottom: 1px solid var(--border);
    padding: 24px 32px;
    background: var(--card-bg);
  }
  .header h1 {
    font-size: 24px;
    font-weight: 700;
    margin-bottom: 4px;
  }
  .header p {
    color: var(--muted);
    font-size: 14px;
  }
  .header .badge {
    display: inline-block;
    background: var(--accent);
    color: #fff;
    font-size: 11px;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 4px;
    margin-left: 8px;
    vertical-align: middle;
  }
  .container { max-width: 1200px; margin: 0 auto; padding: 24px 32px; }
  .plan-card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 12px;
    margin-bottom: 32px;
    overflow: hidden;
  }
  .plan-card-header {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .plan-card-header h2 {
    font-size: 16px;
    font-weight: 600;
  }
  .plan-card-header .sql {
    font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 13px;
    color: var(--accent);
    background: var(--bg);
    padding: 4px 10px;
    border-radius: 6px;
  }
  .plan-card-body {
    padding: 20px;
    min-height: 100px;
    display: flex;
    justify-content: center;
    overflow-x: auto;
  }
  .plan-card-body .mermaid {
    width: 100%;
  }
  .plan-card-body .mermaid svg {
    max-width: 100%;
  }
  .plan-card-raw {
    border-top: 1px solid var(--border);
    padding: 16px 20px;
    background: var(--bg);
  }
  .plan-card-raw summary {
    cursor: pointer;
    font-size: 13px;
    color: var(--muted);
    font-weight: 500;
  }
  .plan-card-raw pre {
    margin-top: 12px;
    font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 12px;
    line-height: 1.5;
    white-space: pre;
    overflow-x: auto;
    color: var(--muted);
  }
  .footer {
    text-align: center;
    padding: 32px;
    color: var(--muted);
    font-size: 13px;
    border-top: 1px solid var(--border);
  }
  .footer a { color: var(--accent); }
</style>
</head>
<body>
<div class="header">
  <h1>PostgreSQL Execution Plan Diagram <span class="badge">Mermaid Plugin</span></h1>
  <p>Visualize <code>EXPLAIN (ANALYZE, COSTS, BUFFERS, FORMAT TEXT)</code> output as interactive tree diagrams</p>
</div>

<div class="container" id="examples"></div>

<div class="footer">
  Built with <a href="https://mermaid.js.org">Mermaid</a> &middot;
  Source: <code>src/</code>
</div>
